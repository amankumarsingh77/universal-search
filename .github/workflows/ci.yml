name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go lint, test, build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            build-essential \
            pkg-config \
            libayatana-appindicator3-dev \
            libx11-dev

      - uses: golangci/golangci-lint-action@v6
        with:
          version: v1.64.8

      - name: go vet
        run: go vet -tags webkit2_41 ./...

      - name: go test
        run: go test -tags webkit2_41 ./...

      - name: go build
        run: go build -tags webkit2_41 ./...

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  file-size:
    name: File size check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - run: bash scripts/check-file-size.sh

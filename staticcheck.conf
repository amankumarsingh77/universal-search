checks = [
  "inherit",
  "-ST1000", # package comment — too many existing files without one
  "-ST1003", # poorly chosen identifiers — noisy
]

[[analyzers]]
name = "SA"
enabled = true

[[analyzers]]
name = "S"
enabled = true

[[analyzers]]
name = "ST"
enabled = true
checks = [
  "ST1005", # incorrectly formatted error string
  "ST1006", # poorly chosen receiver name
  "ST1008", # error return value should not be named
  "ST1011", # variable name length convention
  "ST1012", # poorly chosen error variable name
  "ST1016", # consistent receiver names across methods
  "ST1021", # doc comment on exported type
  "ST1022", # doc comment on exported const/var/function
]

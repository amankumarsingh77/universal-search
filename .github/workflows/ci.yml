name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go:
    name: Go lint, test, build
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache: true

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            build-essential \
            pkg-config \
            libayatana-appindicator3-dev \
            libx11-dev \
            xvfb

      - name: Start Xvfb
        run: |
          Xvfb :99 -screen 0 1024x768x24 &
          echo "DISPLAY=:99" >> "$GITHUB_ENV"

      - name: Install staticcheck
        run: go install honnef.co/go/tools/cmd/staticcheck@latest

      # main.go contains //go:embed all:frontend/dist, which needs at least
      # one non-hidden file in the directory. Empty dirs fail compilation.
      # This placeholder is overwritten by wails build in release; in CI it
      # exists solely to satisfy the embed directive for vet/test/build.
      - name: Create frontend/dist placeholder
        run: mkdir -p frontend/dist && echo '<!doctype html><title>findo</title>' > frontend/dist/index.html

      - name: go vet
        run: go vet -tags webkit2_41 ./...

      - name: staticcheck
        run: staticcheck -tests=false -go 1.26 -tags webkit2_41 ./...

      - name: go test
        run: go test -tags webkit2_41 ./...

      - name: go build
        run: go build -tags webkit2_41 ./...

  frontend:
    name: Frontend lint and build
    runs-on: ubuntu-22.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npm run build

  file-size:
    name: File size check
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - run: bash scripts/check-file-size.sh

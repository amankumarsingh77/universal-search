name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g. v0.1.0)'
        required: true

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            name: findo-linux-amd64
            platform: linux/amd64
            tags: webkit2_41
            artifact: build/bin/findo
          - os: macos-latest
            name: findo-darwin-universal
            platform: darwin/universal
            tags: ''
            artifact: build/bin/findo.app
          - os: windows-latest
            name: findo-windows-amd64
            platform: windows/amd64
            tags: ''
            artifact: build/bin/findo.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: true

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            build-essential \
            pkg-config \
            libayatana-appindicator3-dev \
            libx11-dev \
            xvfb

      - name: Install Wails
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Start virtual display (Linux)
        if: runner.os == 'Linux'
        run: |
          Xvfb :99 -screen 0 1024x768x24 > /dev/null 2>&1 &
          echo "DISPLAY=:99.0" >> $GITHUB_ENV

      - name: Build (with tags)
        if: matrix.tags != ''
        run: wails build -tags ${{ matrix.tags }} -platform ${{ matrix.platform }} -clean

      - name: Build (no tags)
        if: matrix.tags == ''
        run: wails build -platform ${{ matrix.platform }} -clean

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          cd build/bin
          zip -r findo-darwin-universal.zip findo.app
          echo "ARTIFACT_PATH=build/bin/findo-darwin-universal.zip" >> $GITHUB_ENV

      - name: Set artifact path (non-macOS)
        if: runner.os != 'macOS'
        run: echo "ARTIFACT_PATH=${{ matrix.artifact }}" >> $GITHUB_ENV

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ARTIFACT_PATH }}
          retention-days: 7

  release:
    name: Publish release
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**
          generate_release_notes: true
          draft: true
